<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor PDF | Trabajo de Investigación II</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #38bdf8;
            --secondary: #818cf8;
            --bg-base: #020617;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(56, 189, 248, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-main), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-title p { font-size: 0.85rem; color: var(--text-muted); }
        .btn-volver {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.3s ease;
        }
        .btn-volver:hover {
            background: var(--primary);
            color: var(--bg-base);
            box-shadow: 0 0 15px var(--primary);
        }
        .viewer-container {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <h1><i class="fa-solid fa-file-pdf" style="color: #ef4444; margin-right: 8px;"></i> Monografía: Librerías Python</h1>
            <p>Keras, PyTorch y NLTK — UTEA Cusco</p>
        </div>
        <a href="index.html" class="btn-volver"><i class="fa-solid fa-arrow-left"></i> Volver al Portafolio</a>
    </header>

    <div class="viewer-container">
        <iframe src="3librerias.pdf" type="application/pdf"></iframe>
    </div>

</body>
</html>
