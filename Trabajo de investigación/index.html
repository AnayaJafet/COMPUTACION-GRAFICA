<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D | Jafet Anaya Estrada</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --bg-dark: #020617;
            --glass: rgba(15, 23, 42, 0.8);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-dark); 
        }

        /* Panel de Control Estilo Portafolio */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
            max-width: 280px;
        }

        h2 { 
            margin: 0 0 15px 0; 
            font-size: 1.2rem; 
            color: var(--primary); 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .key-hint {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        kbd {
            background: #334155;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-family: monospace;
        }

        .btn-action {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-action:hover {
            background: var(--primary);
            color: var(--bg-dark);
        }

        #loading-screen {
            position: absolute;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(56, 189, 248, 0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Cargando Modelo 3D...</p>
    </div>

    <div id="ui-panel">
        <h2><i class="fa-solid fa-cube"></i> Editor de Modelo</h2>
        
        <div class="key-hint"><span>Traslación:</span> <kbd>WASD</kbd></div>
        <div class="key-hint"><span>Rotación:</span> <kbd>↑↓←→</kbd></div>
        <div class="key-hint"><span>Escala:</span> <kbd>+/-</kbd></div>

        <div class="controls-grid">
            <button class="btn-action" id="resetBtn">Reiniciar</button>
            <button class="btn-action" id="autoRotateBtn">Giro Auto</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CONFIGURACIÓN ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- ILUMINACIÓN ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);

        const spotLight = new THREE.SpotLight(0x38bdf8, 50);
        spotLight.position.set(5, 10, 5);
        spotLight.castShadow = true;
        scene.add(spotLight);

        // --- GRID Y AYUDAS ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x38bdf8, 0x1e293b);
        scene.add(gridHelper);

        // --- CARGA DEL MODELO (cubo.glb) ---
        let model;
        let isAutoRotating = false;
        const loader = new GLTFLoader();

        // IMPORTANTE: Asegúrate de que el archivo cubo.glb esté en la misma carpeta que este HTML
        loader.load('cubo.glb', 
            (gltf) => {
                model = gltf.scene;
                
                // Centrar y escalar si es necesario
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                document.getElementById('loading-screen').style.display = 'none';
            },
            undefined,
            (error) => {
                console.error('Error cargando el modelo:', error);
                alert('No se pudo cargar el archivo cubo.glb. Verifica la ruta.');
            }
        );

        // --- CONTROLES ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- LÓGICA DE TECLADO ---
        window.addEventListener('keydown', (e) => {
            if (!model) return;
            const step = 0.2;
            const rotStep = 0.1;

            switch(e.key.toLowerCase()) {
                // Traslación
                case 'w': model.position.z -= step; break;
                case 's': model.position.z += step; break;
                case 'a': model.position.x -= step; break;
                case 'd': model.position.x += step; break;
                // Rotación
                case 'arrowleft': model.rotation.y -= rotStep; break;
                case 'arrowright': model.rotation.y += rotStep; break;
                case 'arrowup': model.rotation.x -= rotStep; break;
                case 'arrowdown': model.rotation.x += rotStep; break;
                // Escala
                case '+': case '=': model.scale.multiplyScalar(1.1); break;
                case '-': case '_': model.scale.multiplyScalar(0.9); break;
            }
        });

        // Botones UI
        document.getElementById('resetBtn').onclick = () => {
            model.position.set(0, 0, 0);
            model.rotation.set(0, 0, 0);
            model.scale.set(1, 1, 1);
        };

        document.getElementById('autoRotateBtn').onclick = () => {
            isAutoRotating = !isAutoRotating;
        };

        // --- CICLO DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (model && isAutoRotating) {
                model.rotation.y += 0.01;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Ajuste de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
