<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Traslación 3D</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
        }
        
        .btn-regresar { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 1000; 
            padding: 10px 20px; 
            background: rgba(30, 41, 59, 0.6); 
            color: #38bdf8; 
            text-decoration: none; 
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px; 
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-regresar:hover {
            background: #38bdf8;
            color: #020617;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        #info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(15, 23, 42, 0.7); 
            padding: 20px; 
            border-radius: 16px; 
            font-size: 14px; 
            line-height: 1.8;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 320px;
        }

        #info strong {
            color: #f472b6; 
            font-size: 1.1rem;
            display: block;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="btn-regresar"><i class="fa-solid fa-arrow-left"></i> Regresar</a>
    
    <div id="info">
        <strong><i class="fa-solid fa-arrows-left-right"></i> TRASLACIÓN CON REBOTE</strong>
        Animación de desplazamiento en el Eje X.<br><br>
        El algoritmo calcula dinámicamente el ancho del <span class="highlight">Frustum de la cámara</span> para asegurar que el cubo rebote exactamente en los bordes de la pantalla, sin importar la resolución.
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Cuadrícula de referencia para visualizar el desplazamiento en el espacio
        const gridHelper = new THREE.GridHelper(20, 20, 0x38bdf8, 0x1e293b);
        gridHelper.position.y = -1.5;
        scene.add(gridHelper);

        const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const material = new THREE.MeshNormalMaterial();
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        // Velocidad de movimiento inicial
        let direccion = 0.04;

        function animate() {
            requestAnimationFrame(animate);
            
            // Mover el cubo en el eje X
            cubo.position.x += direccion;

            // Rotación suave añadida para que no parezca un bloque estático
            cubo.rotation.x += 0.01;
            cubo.rotation.y += 0.01;

            // --- CÁLCULO DINÁMICO DE BORDES ---
            // Convertimos el campo de visión (FOV) a radianes
            const vFOV = THREE.MathUtils.degToRad(camera.fov);
            // Calculamos la altura y anchura visible a la distancia z del cubo
            const visibleHeight = 2 * Math.tan(vFOV / 2) * camera.position.z;
            const visibleWidth = visibleHeight * camera.aspect;
            
            // El límite es la mitad de la pantalla menos la mitad del cubo (0.6)
            const limitePantalla = (visibleWidth / 2) - 0.6;

            // Lógica de rebote adaptativa
            if (cubo.position.x > limitePantalla) {
                cubo.position.x = limitePantalla; // Corrección de posición
                direccion = -Math.abs(direccion); // Invierte la dirección hacia la izquierda
            }
            if (cubo.position.x < -limitePantalla) {
                cubo.position.x = -limitePantalla; // Corrección de posición
                direccion = Math.abs(direccion);  // Invierte la dirección hacia la derecha
            }

            renderer.render(scene, camera);
        }
        
        animate();

        // Ajuste responsivo
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
