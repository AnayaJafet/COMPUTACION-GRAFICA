<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Rotación Continua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; /* Fondo ultra oscuro */
        }
        
        .btn-regresar { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 1000; 
            padding: 10px 20px; 
            background: rgba(30, 41, 59, 0.6); 
            color: #38bdf8; 
            text-decoration: none; 
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 8px; 
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-regresar:hover {
            background: #38bdf8;
            color: #020617;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        #info { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(15, 23, 42, 0.7); 
            padding: 20px; 
            border-radius: 16px; 
            font-size: 14px; 
            line-height: 1.8;
            color: #f8fafc;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 300px;
        }

        #info strong {
            color: #f472b6; /* Rosa neón */
            font-size: 1.1rem;
            display: block;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        
        .highlight {
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="btn-regresar"><i class="fa-solid fa-arrow-left"></i> Regresar</a>
    
    <div id="info">
        <strong><i class="fa-solid fa-rotate"></i> ROTACIÓN CONTINUA</strong>
        Animación automática utilizando <span class="highlight">requestAnimationFrame</span>.<br><br>
        El cubo está rotando constantemente en dos ejes espaciales simultáneamente:<br>
        • Eje X (velocidad: 0.01)<br>
        • Eje Y (velocidad: 0.02)
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // 1. Configuración básica de la escena
        const scene = new THREE.Scene();
        
        // 2. Configuración de la cámara
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // 3. Configuración del renderizador
        // alpha: true permite que el fondo CSS sea visible
        // antialias: true suaviza los bordes del cubo
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Mejora la nitidez en pantallas de alta densidad
        document.body.appendChild(renderer.domElement);

        // 4. Creación del objeto (Cubo)
        const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5); // Ligeramente más grande para apreciarlo mejor
        const material = new THREE.MeshNormalMaterial(); // Material que mapea los vectores normales a colores RGB
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        // 5. Bucle de animación
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotación continua en dos ejes
            cubo.rotation.x += 0.01;
            cubo.rotation.y += 0.02;

            renderer.render(scene, camera);
        }
        
        // Iniciar animación
        animate();

        // 6. Ajuste responsivo al cambiar tamaño de ventana
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
