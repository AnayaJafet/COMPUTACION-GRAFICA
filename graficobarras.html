<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gráfico de Barras</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }

        h1, h2 {
            color: #e06c00;
        }

        canvas {
            border: 4px solid #00b894;
            background: #ffffff;
        }
    </style>
</head>

<body>

    <h1>Crear un gráfico de barras</h1>
    <h2>Realizado por Jafet Antony Anaya Estrada</h2>

    <canvas id="myCanvas" width="600" height="400"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        var datos = [100, 200, 300, 400, 500];
        var colores = ["red", "blue", "green", "orange", "purple"];
        var etiquetas = ["A", "B", "C", "D", "E"];

        // CALCULAR TOTAL
        var total = datos.reduce((a, b) => a + b, 0);

        var x = 60;
        var width = 60;
        var base = 350;

        // DIBUJAR EJE X
        ctx.beginPath();
        ctx.moveTo(40, base);
        ctx.lineTo(550, base);
        ctx.stroke();

        // DIBUJAR EJE Y
        ctx.beginPath();
        ctx.moveTo(40, 50);
        ctx.lineTo(40, base);
        ctx.stroke();

        for (var i = 0; i < datos.length; i++) {

            var altura = datos[i] * 0.5; // escala
            var y = base - altura;

            // BARRA
            ctx.beginPath();
            ctx.rect(x, y, width, altura);
            ctx.fillStyle = colores[i];
            ctx.fill();
            ctx.stroke();

            // PORCENTAJE
            var porcentaje = ((datos[i] / total) * 100).toFixed(1) + "%";
            ctx.fillStyle = "black";
            ctx.font = "12px Arial";
            ctx.textAlign = "center";
            ctx.fillText(porcentaje, x + width / 2, y - 5);

            // ETIQUETA ABAJO
            ctx.fillText(etiquetas[i], x + width / 2, base + 15);

            x += width + 20;
        }
    </script>

</body>
</html>
