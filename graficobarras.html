<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfico de Barras</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .contenedor {
            background: white;
            color: black;
            width: 600px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        canvas {
            border: 3px solid #333;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>Gráfico de Barras</h1>

    <div class="contenedor">
        <h2>Realizado por Jafet Antony Anaya Estrada</h2>

        <canvas id="myCanvas" width="500" height="500"></canvas>
    </div>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // DATOS
        var datos = [100, 200, 300, 400, 500];
        var colores = ["red", "blue", "green", "orange", "purple"];

        // CALCULAR TOTAL PARA PORCENTAJES
        var total = 0;
        for (var i = 0; i < datos.length; i++) {
            total += datos[i];
        }

        var x = 50;
        var width = 50;

        for (var i = 0; i < datos.length; i++) {

            var altura = datos[i];
            var y = 500 - altura;

            // DIBUJAR BARRA
            ctx.beginPath();
            ctx.rect(x, y, width, altura);
            ctx.fillStyle = colores[i];
            ctx.fill();
            ctx.stroke();

            // CALCULAR PORCENTAJE
            var porcentaje = ((datos[i] / total) * 100).toFixed(1) + "%";

            // TEXTO (PORCENTAJE)
            ctx.fillStyle = "black";
            ctx.font = "14px Arial";
            ctx.textAlign = "center";

            // Mostrar arriba de la barra
            ctx.fillText(porcentaje, x + width / 2, y - 5);

            x += width + 20;
        }
    </script>

</body>
</html>
