<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear un gráfico de barras</title>
</head>
<body>
    <style>
        h2 {
            color: rgb(218, 114, 17);
        }
    </style>
    <h2>Crear un gráfico de barras</h2>
    <h2>Realizado por Jafet Antony Anaya Estrada </h2>
    <canvas id="myCanvas" width="500" height="500" style="border:4px solid rgb(34, 214, 160);"></canvas>
    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");
        // DATOS DE BARRAS
        var datos = [100, 200, 300, 400, 500];
        var colores = ["red", "blue", "green", "orange", "purple"];
        // DIBUJAR LAS BARRAS
        var x = 50; // Posición inicial en el eje x
        var width = 50; // Ancho de cada barra
        for (var i = 0; i < datos.length; i++) {
            ctx.beginPath();
            ctx.rect(x, 500 - datos[i], width, datos[i]); // x, y, ancho, alto
            ctx.fillStyle = colores[i];
            ctx.fill();
            ctx.stroke();
            x += width + 20; // Espacio entre barras
        }
    </script>

</body>

</html>
