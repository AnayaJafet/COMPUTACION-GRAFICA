<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1 - Jafet Anaya</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; 
        }
        h2 { color: #1e293b; margin-bottom: 5px; }
        .autor { color: #64748b; margin-bottom: 20px; }
        
        /* Contenedor del gráfico */
        #grafico-container { 
            display: flex; align-items: flex-end; justify-content: center;
            height: 350px; width: 500px; gap: 15px; padding: 20px;
            background: white; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-bottom: 4px solid #cbd5e1;
        }

        .barra { 
            width: 60px; background: linear-gradient(to top, #3b82f6, #60a5fa); 
            transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative; border-radius: 6px 6px 0 0;
        }

        .valor-texto { 
            position: absolute; top: -30px; width: 100%; text-align: center;
            font-weight: bold; color: #1e40af;
        }
    </style>
</head>
<body>

    <h2>Gráfico de Barras Dinámico</h2>
    <div class="autor">Realizado por Jafet Antony Anaya Estrada</div>

    <div id="grafico-container">
        <div class="barra" id="b1"><span class="valor-texto"></span></div>
        <div class="barra" id="b2"><span class="valor-texto"></span></div>
        <div class="barra" id="b3"><span class="valor-texto"></span></div>
        <div class="barra" id="b4"><span class="valor-texto"></span></div>
        <div class="barra" id="b5"><span class="valor-texto"></span></div>
    </div>

    <script>
        function actualizarBarras() {
            const barras = document.querySelectorAll('.barra');
            
            barras.forEach(barra => {
                // Requisito: Valores aleatorios entre 10 y 100
                const valor = Math.floor(Math.random() * (100 - 10 + 1)) + 10;
                
                // Actualizar altura (multiplicamos por 3 para que se vea bien)
                barra.style.height = (valor * 3) + "px";
                
                // Actualizar texto superior
                barra.querySelector('.valor-texto').innerText = valor;
            });
        }

        // Requisito: Actualizar cada segundo (1000ms)
        setInterval(actualizarBarras, 1000);
        actualizarBarras(); // Llamada inicial
    </script>
</body>
</html>
